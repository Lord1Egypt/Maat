syntax = "proto3";
package maat.market.v1;

option go_package = "github.com/Lord1Egypt/Maat/x/market/types";

import "maat/market/v1/query.proto";

message GenesisState {
  Params                  params  = 1;
  repeated DenomReserve reserves = 2;
}

message DenomReserve {
  string denom          = 1;
  int64  asset_units    = 2;
  int64  wrapped_supply = 3;
  int64  spread_usd     = 4;
  int64  min_backing_bps = 5;
}
