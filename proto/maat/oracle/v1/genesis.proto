syntax = "proto3";
package maat.oracle.v1;

option go_package = "github.com/Lord1Egypt/Maat/x/oracle/types";

import "maat/oracle/v1/query.proto";

message GenesisState {
  Params          params  = 1;
  repeated DenomMid mids  = 2;
}

message DenomMid {
  string denom  = 1;
  int64  mid    = 2;
  bool   halted = 3;
}
