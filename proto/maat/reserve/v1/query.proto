syntax = "proto3";
package maat.reserve.v1;

option go_package = "github.com/Lord1Egypt/Maat/x/reserve/types";

message QueryBackingRequest {
  string denom = 1;
}

message QueryBackingResponse {
  int64 asset_units    = 1;
  int64 wrapped_supply = 2;
  int64 backing_bps    = 3;
  bool  healthy        = 4;
}

message QueryAllBackingRequest {}

message QueryAllBackingResponse {
  repeated DenomBacking denoms = 1;
}

message DenomBacking {
  string denom         = 1;
  int64  asset_units   = 2;
  int64  wrapped_supply = 3;
  int64  backing_bps   = 4;
  bool   healthy       = 5;
}
