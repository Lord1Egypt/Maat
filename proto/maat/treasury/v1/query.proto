syntax = "proto3";
package maat.treasury.v1;

option go_package = "github.com/Lord1Egypt/Maat/x/treasury/types";

message QueryBalancesRequest {}

message QueryBalancesResponse {
  int64 reserve   = 1;
  int64 rewards   = 2;
  int64 insurance = 3;
  int64 treasury  = 4;
}

message QueryParamsRequest {}

message QueryParamsResponse {
  SplitParams spread_split     = 1;
  SplitParams bridge_out_split = 2;
}

message SplitParams {
  int64 reserve_bps   = 1;
  int64 rewards_bps   = 2;
  int64 insurance_bps = 3;
  int64 treasury_bps  = 4;
}
